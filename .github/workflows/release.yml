name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "24"
  RELEASE_BRANCH: changeset-release/main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Bun
        run: |
          npm install --global bun@"${BUN_VERSION}"
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run package checks
        run: bun run check

      - name: Audit dependencies
        run: bun run audit

      - name: Detect pending changesets
        id: changesets
        shell: bash
        run: |
          shopt -s nullglob
          pending=()
          for file in .changeset/*.md; do
            if [[ "$(basename "${file}")" != "README.md" ]]; then
              pending+=("${file}")
            fi
          done
          if (( ${#pending[@]} > 0 )); then
            printf 'has_pending=true\n' >> "${GITHUB_OUTPUT}"
          else
            printf 'has_pending=false\n' >> "${GITHUB_OUTPUT}"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_pending == 'true'
        run: bun run version

      - name: Create or update release PR
        if: steps.changesets.outputs.has_pending == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No version changes generated."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${RELEASE_BRANCH}"
          git add .
          git commit -m "chore(release): version packages"
          git push origin "HEAD:${RELEASE_BRANCH}" --force

          title="chore(release): version packages"
          body="Version packages generated by Changesets."
          existing_pr="$(gh pr list --head "${RELEASE_BRANCH}" --base main --state open --json number --jq '.[0].number // empty')"
          if [[ -n "${existing_pr}" ]]; then
            gh pr edit "${existing_pr}" --title "${title}" --body "${body}"
          else
            gh pr create --base main --head "${RELEASE_BRANCH}" --title "${title}" --body "${body}"
          fi

      - name: Publish package
        if: steps.changesets.outputs.has_pending == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "${NPM_TOKEN}" ]]; then
            npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
          fi
          bun run changeset:publish
          git push --follow-tags

          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          notes_file="$(mktemp)"
          node scripts/extract-changelog-notes.mjs "${version}" > "${notes_file}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "GitHub Release ${tag} already exists. Leaving it unchanged."
          else
            gh release create "${tag}" --verify-tag --title "${tag}" --notes-file "${notes_file}"
          fi
